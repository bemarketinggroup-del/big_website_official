<script type="text/babel">

const { useEffect, useState, useRef } = React;
const BMG_CMS_ENDPOINT = "https://bmg-hub.vercel.app/api/public-site-content";

function normalizeCmsRows(rows) {
  return rows.reduce((acc, row) => {
    acc[row.slug] = {
      type: row.type,
      title: row.title || "",
      ...(row.payload || {}),
    };
    return acc;
  }, {});
}

function useBmgCms() {
  const [cms, setCms] = useState({});
  useEffect(() => {
    let alive = true;
    fetch(BMG_CMS_ENDPOINT)
      .then((response) => response.ok ? response.json() : [])
      .then((rows) => {
        if (alive) setCms(normalizeCmsRows(Array.isArray(rows) ? rows : []));
      })
      .catch(() => {});
    return () => { alive = false; };
  }, []);
  return cms;
}

function cmsSlot(cms, slug) {
  return cms[slug] || {};
}

function cmsText(cms, slug, field, fallback) {
  const value = cmsSlot(cms, slug)[field];
  return value ? value : fallback;
}

/* ─────────────────────── shared primitives ─────────────────────── */
function Reveal({ children, delay = 0, as: As = "div", style, className = "", ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    // Se l'elemento è già visibile al mount, mostralo subito senza animazione
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight && rect.bottom > 0) {
      el.classList.add("instant", "in");
      return;
    }
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => {
        if (e.isIntersecting) {
          // delay massimo 40ms per non percepire lo stagger
          const d = Math.min(delay, 40);
          if (d > 0) setTimeout(() => el.classList.add("in"), d);
          else el.classList.add("in");
          io.unobserve(el);
        }
      });
    }, { threshold: 0.05, rootMargin: "0px 0px 60px 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return <As ref={ref} className={`reveal ${className}`} style={style} {...rest}>{children}</As>;
}

/* Star sticker — playful pop accent (CSS only) */
function Star({ size = 64, color = "var(--yellow)", style }) {
  return (
    <svg viewBox="-50 -50 100 100" width={size} height={size} style={style} aria-hidden="true">
      <path fill={color} stroke="var(--ink)" strokeWidth="3" strokeLinejoin="round"
      d="M0,-48 L11,-15 L46,-15 L18,5 L29,38 L0,18 L-29,38 L-18,5 L-46,-15 L-11,-15 Z" />
    </svg>);

}

/* Spiky badge — rotating sticker */
function Spiky({ size = 130, color = "var(--yellow)", text = "NEW", textColor = "var(--ink)", style }) {
  const pts = 14;
  const mk = (rIn, rOut) => Array.from({ length: pts * 2 }).map((_, i) => {
    const a = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
    const r = i % 2 ? rOut : rIn;
    return `${(Math.cos(a) * r).toFixed(2)},${(Math.sin(a) * r).toFixed(2)}`;
  }).join(" ");
  return (
    <div aria-hidden="true" style={{ position: "relative", width: size, height: size, filter: "drop-shadow(0 7px 16px rgba(10,10,20,0.2))", ...style }}>
      <svg viewBox="-50 -50 100 100" width={size} height={size}
        style={{ position: "absolute", inset: 0, animation: "spin-slow 18s linear infinite" }}>
        <polygon points={mk(42, 50)} fill="#fff" />
        <polygon points={mk(38, 45)} fill={color} stroke="var(--ink)" strokeWidth="2" strokeLinejoin="round" />
      </svg>
      <span className="mono" style={{
        position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
        width: size * 0.62, color: textColor, fontWeight: 700, letterSpacing: "0.02em",
        fontSize: Math.max(9, size * 0.108), textAlign: "center", lineHeight: 1.12, textWrap: "balance",
      }}>{text}</span>
    </div>);

}

/* Arrow scribble — hand-drawn vibe */
function Squiggle({ width = 180, color = "var(--red)", style }) {
  return (
    <svg viewBox="0 0 200 60" width={width} height={width * 0.3} style={style} aria-hidden="true" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
      <path d="M4 30 C 30 8, 60 52, 90 30 S 150 8, 180 30" />
      <path d="M168 18 L 184 30 L 168 42" />
    </svg>);

}

/* Logo wordmark — Beviral */
function BeviralLogo({ size = 22, variant = "blue" }) {
  return (
    <img src={`assets/logo-beviral-${variant}.png`} alt="Beviral" draggable="false"
      style={{ height: size * 1.25, width: "auto", display: "block" }} />);

}

/* ── beViral sticker-bombing: clic su un'area libera (mai sopra bottoni o testi) per attaccare un adesivo ── */
const STICKER_PALETTE = ["blue", "magenta", "yellow", "black"];
const STICKER_MAX = 30;

function StickerBomb() {
  const [items, setItems] = useState([]); // { id, color, rot, w, x, y, out }
  const [clearing, setClearing] = useState(false);
  const nextColor = useRef(0);

  const removeTimers = useRef({});
  // dissolvenza + rimozione definitiva degli adesivi marcati 'out' (timer indipendenti, non annullabili)
  useEffect(() => {
    items.forEach((s) => {
      if (s.out && !removeTimers.current[s.id]) {
        removeTimers.current[s.id] = setTimeout(() => {
          delete removeTimers.current[s.id];
          setItems((arr) => arr.filter((x) => x.id !== s.id));
        }, 400);
      }
    });
  }, [items]);

  useEffect(() => {
    const BLOCK = 'a, button, input, textarea, select, label, iframe, [role="button"], nav, h1, h2, h3, h4, p, li, [data-no-sticker], [data-sticker-ui]';
    const NEAR = 'a, button, input, textarea, select, label, iframe, [role="button"], [data-no-sticker], [data-sticker-ui]';
    const blocked = (x, y) => {
      const el = document.elementFromPoint(x, y);
      if (!el) return true;
      if (el.closest(BLOCK)) return true;             // mai su testi / elementi interattivi
      let n = el;                                       // né su card cliccabili (cursor:pointer)
      for (let i = 0; i < 4 && n; i++) { if (getComputedStyle(n).cursor === "pointer") return true; n = n.parentElement; }
      const margin = 40;                                // margine di sicurezza attorno ai cliccabili
      for (const e2 of document.querySelectorAll(NEAR)) {
        const r = e2.getBoundingClientRect();
        if (!r.width && !r.height) continue;
        if (x >= r.left - margin && x <= r.right + margin && y >= r.top - margin && y <= r.bottom + margin) return true;
      }
      return false;
    };
    const onClick = (e) => {
      if (blocked(e.clientX, e.clientY)) return;
      // l'inserimento dell'adesivo è indipendente: non deve propagarsi (es. al carosello iPhone)
      e.stopPropagation();
      const color = STICKER_PALETTE[nextColor.current % STICKER_PALETTE.length];
      nextColor.current += 1;
      const small = window.innerWidth < 720;
      const w = (small ? 84 : 116) + Math.round(Math.random() * (small ? 26 : 52));
      const rot = Math.round((Math.random() * 2 - 1) * 15);
      const id = Date.now() + "" + Math.round(Math.random() * 1e4);
      const half = w / 2 + 4;
      const clampedX = Math.min(Math.max(e.pageX, half), window.innerWidth - half);
      setItems((prev) => {
        let next = [...prev, { id, color, rot, w, x: clampedX, y: e.pageY, out: false }];
        const live = next.filter((s) => !s.out);
        if (live.length > STICKER_MAX) {          // FIFO: marca il più vecchio per la dissolvenza
          const oldestId = live[0].id;
          next = next.map((s) => (s.id === oldestId ? { ...s, out: true } : s));
        }
        return next;
      });
    };
    // capture-phase: intercetta il click PRIMA degli handler del carosello, così lo
    // stopPropagation impedisce qualsiasi avanzamento del widget. 'click' non scatta
    // sullo scroll (solo tap/click intenzionali) → ok mobile.
    document.addEventListener("click", onClick, true);
    return () => document.removeEventListener("click", onClick, true);
  }, []);

  const clearAll = () => {
    setClearing(true);
    setTimeout(() => {
      Object.values(removeTimers.current).forEach(clearTimeout);
      removeTimers.current = {};
      setItems([]); setClearing(false); nextColor.current = 0;
    }, 420);
  };

  const liveCount = items.filter((s) => !s.out).length;

  return (
    <React.Fragment>
      <div aria-hidden="true" style={{ position: "absolute", top: 0, left: 0, width: "100%", height: 0, zIndex: 40, pointerEvents: "none" }}>
        {items.map((s) => {
          const gone = s.out || clearing;
          return (
            <div key={s.id} style={{
              position: "absolute", left: s.x, top: s.y,
              transform: `translate(-50%, -50%) scale(${gone ? 0.55 : 1})`,
              opacity: gone ? 0 : 1,
              transition: "opacity .38s ease, transform .38s cubic-bezier(.3,.7,.3,1)",
            }}>
              <img src={`assets/images/beviral/sticker-${s.color}.png`} alt="" draggable="false"
                style={{ display: "block", width: s.w, height: "auto", "--final": `${s.rot}deg`, animation: "pop .4s cubic-bezier(.2,.85,.3,1) both" }} />
            </div>
          );
        })}
      </div>
      {liveCount > 3 ? (
        <button data-sticker-ui onClick={clearAll} style={{
          position: "fixed", left: 16, bottom: 16, zIndex: 60,
          fontFamily: "JetBrains Mono, ui-monospace, monospace", fontSize: 11, letterSpacing: "0.06em", textTransform: "uppercase",
          background: "var(--ink)", color: "#fff", border: "none", borderRadius: 999, padding: "10px 16px", cursor: "pointer",
          boxShadow: "0 8px 22px rgba(10,10,20,0.28)",
        }}>✕ pulisci adesivi</button>
      ) : null}
    </React.Fragment>
  );
}

/* ─────────────────────── NAV ─────────────────────── */

    const f = () => setScrolled(window.scrollY > 20);

    return () => window.removeEventListener("scroll", f);

    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
      padding: "16px var(--pad)",

/* ─────────────────────── HERO ─────────────────────── */
function Hero({ cms = {} }) {
  const heroCopy = cmsSlot(cms, "beviral.hero.copy");
  return (
    <section style={{ position: "relative", paddingTop: 120, paddingBottom: 48, overflow: "hidden" }}>
      {/* floating stickers */}
      <Star size={70} color="var(--yellow)" style={{
        position: "absolute", top: 130, left: "6%",
        animation: "bob 4s ease-in-out infinite", "--rot": "-12deg"
      }} />
      <Spiky size={108} color="var(--red)" text="100% ORGANIC" textColor="#fff"
      style={{ position: "absolute", top: 104, right: "7%" }} />
      <Star size={42} color="var(--blue)" style={{
        position: "absolute", top: 320, right: "26%",
        animation: "bob 5s ease-in-out infinite .8s", "--rot": "18deg"
      }} />

      {/* tiny status */}
      <div style={{
        maxWidth: "var(--max)", margin: "0 auto",
        padding: "0 var(--pad)",
        display: "flex", gap: 14, alignItems: "center", color: "var(--ink-muted)"
      }}>
      </div>

      {/* claim */}
      <div style={{
        maxWidth: "var(--max)", margin: "40px auto 0", padding: "0 var(--pad)",
        display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 60, alignItems: "end"
      }}>
        <h2 className="display" style={{
          margin: 0,
          fontSize: "clamp(36px, 5.5vw, 84px)",
          lineHeight: 0.95,
          letterSpacing: "-0.03em",
          textWrap: "balance"
        }}>
          {heroCopy.title ? (
            <>
              <span className="underline-marker">{heroCopy.title}</span>
              {heroCopy.subtitle && (
                <>
                  <br />
                  <span className="serif-i" style={{ color: "var(--blue)" }}>{heroCopy.subtitle}</span>
                </>
              )}
            </>
          ) : (
            <>
              <span className="underline-marker">Diventa virale.</span>
              <br />
              <span className="serif-i" style={{ color: "var(--blue)" }}>Davvero</span>.
            </>
          )}
        </h2>
        <div>
          <p style={{ margin: 0, fontSize: 18, lineHeight: 1.5, maxWidth: 460, color: "var(--ink)" }}>
            {cmsText(cms, "beviral.hero.copy", "body", <>La divisione di BMG dedicata alla crescita <strong>organica</strong>, al personal branding e ai video che fanno <strong>copertura</strong>. Aiutiamo imprenditori, professionisti e aziende a diventare un punto di riferimento nel proprio settore.</>)}
          </p>
          <div style={{ display: "flex", gap: 12, marginTop: 28, flexWrap: "wrap" }}>
            <a href="#cta" className="sticker" style={{ background: "var(--blue)", color: "#fff", borderColor: "var(--ink)", fontSize: 12, padding: "12px 22px" }}>
              Lavoriamo insieme →
            </a>
            <a href="#metodo" className="sticker" style={{ background: "var(--yellow)", fontSize: 12, padding: "12px 22px" }}>
              ↓ Il metodo
            </a>
          </div>
        </div>
      </div>
    </section>);

}

/* ─────────────────────── MARQUEE ─────────────────────── */
function PopMarquee() {
  const items = [
  { t: "VIDEO VIRALI", c: "var(--blue)", bg: null },
  { t: "PERSONAL BRANDING", c: "var(--ink)", bg: "var(--yellow)" },
  { t: "COPERTURA ORGANICA", c: "var(--red)", bg: null },
  { t: "REELS · TIKTOK · IG", c: "#fff", bg: "var(--blue)" },
  { t: "STORYTELLING", c: "var(--ink)", bg: null },
  { t: "HOOK & SCRIPT", c: "#fff", bg: "var(--red)" },
  { t: "COMMUNITY", c: "var(--ink)", bg: "var(--yellow)" },
  { t: "AUTHORITY", c: "var(--blue)", bg: null }];

  const row = [...items, ...items, ...items];
  return (
    <section style={{
      borderTop: "1.5px solid var(--ink)",
      borderBottom: "1.5px solid var(--ink)",
      padding: "22px 0",
      overflow: "hidden",
      background: "#fff"
    }}>
      <div style={{ overflow: "hidden" }}>
        <div style={{
          display: "inline-flex", gap: 28, whiteSpace: "nowrap",
          animation: "marquee 30s linear infinite",
          width: "max-content"
        }}>
          {row.map((it, i) =>
          <span key={i} style={{
            display: "inline-flex", alignItems: "center", gap: 28,
            fontFamily: "Space Grotesk", fontWeight: 700,
            fontSize: 36, letterSpacing: "-0.02em",
            color: it.c,
            padding: it.bg ? "4px 18px" : 0,
            background: it.bg || "transparent",
            borderRadius: it.bg ? 999 : 0,
            border: it.bg ? "1.5px solid var(--ink)" : "none"
          }}>
              {it.t}
              <span style={{
              width: 12, height: 12, borderRadius: "50%",
              background: ["var(--blue)", "var(--red)", "var(--yellow)", "var(--ink)"][i % 4],
              border: "1.5px solid var(--ink)",
              display: "inline-block"
            }} />
            </span>
          )}
        </div>
      </div>
    </section>);

}

/* ─────────────────────── MANIFESTO ─────────────────────── */
function Manifesto() {
  return (
    <section style={{ padding: "120px 0 100px", position: "relative" }}>
      <div style={{ maxWidth: "var(--max)", margin: "0 auto", padding: "0 var(--pad)" }}>

/* ─────────────────────── CALENDLY MODAL ─────────────────────── */
function CalendlyModal({ url, onClose }) {
  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => {
      document.body.style.overflow = prev;
      window.removeEventListener("keydown", onKey);
    };
  }, []);
  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, zIndex: 9999,
      background: "rgba(14,12,8,0.88)",
      backdropFilter: "blur(6px)",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "20px",
      animation: "fadein .25s ease",
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        position: "relative",
        width: "100%", maxWidth: 720,
        height: "min(90vh, 760px)",
        background: "#fff",
        borderRadius: 16,
        overflow: "hidden",
        boxShadow: "0 32px 80px rgba(0,0,0,0.6)",
        display: "flex", flexDirection: "column",
      }}>
        <button onClick={onClose} aria-label="Chiudi" style={{
          position: "absolute", top: 14, right: 14, zIndex: 10,
          width: 36, height: 36,
          background: "var(--ink)", color: "#fff",
          border: "none", borderRadius: "50%",
          cursor: "pointer", fontSize: 18, lineHeight: 1,
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "background .2s",
        }}
          onMouseEnter={(e) => e.currentTarget.style.background = "var(--blue)"}
          onMouseLeave={(e) => e.currentTarget.style.background = "var(--ink)"}
        >×</button>
        <iframe src={url} width="100%" height="100%" frameBorder="0"
          title="Prenota una consulenza"
          style={{ flex: 1, border: "none", display: "block" }} />
      </div>
    </div>
  );
}

  return m ? m[1] : null;
}
function ttSrc(id, active) {
  const p = new URLSearchParams({
    music_info: 0, description: 0, controls: 1, progress_bar: 0, timestamp: 0,
    loop: 1, rel: 0, native_context_menu: 0, closed_caption: 0, volume_control: 0,
    autoplay: active ? 1 : 0,
  });
  return `https://www.tiktok.com/player/v1/${id}?${p.toString()}`;
}

function Phone({ item, play, live }) {
  const id = ttId(item.url);
  return (
    <div style={{ position: "relative", width: "var(--phw)", aspectRatio: "2134 / 4300" }}>
      {/* video clipped inside the PNG display area */}
      <div style={{ position: "absolute", left: "5.81%", top: "2.42%", width: "88.38%", height: "95.16%", overflow: "hidden", background: "#000", zIndex: 1 }}>
        {live && id ? (
          <iframe
            title={item.client}
            src={ttSrc(id, play)}
            allow="autoplay; encrypted-media; fullscreen"
            style={{ position: "absolute", left: 0, top: "50%", transform: "translateY(-50%)", width: "100%", height: "auto", aspectRatio: "9 / 16", border: 0, display: "block", background: "#000" }}
          />
        ) : (
          <div style={{
            width: "100%", height: "100%",
            background: "radial-gradient(120% 80% at 30% 12%, #1f1240 0%, #0a0a14 55%, #050509 100%)",
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
            gap: 16, color: "#fff", textAlign: "center", padding: "0 22px",
          }}>
            <div style={{ width: 58, height: 58, borderRadius: "50%", background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.18)", display: "grid", placeItems: "center" }}>
              <span style={{ width: 0, height: 0, marginLeft: 4, borderTop: "12px solid transparent", borderBottom: "12px solid transparent", borderLeft: "18px solid #fff" }} />
            </div>
            <div className="mono" style={{ color: "rgba(255,255,255,0.85)", fontSize: 10 }}>{item.client}</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", lineHeight: 1.4, maxWidth: 180 }}>
              {id ? "Anteprima" : "Incolla il link TikTok"}
            </div>
          </div>
        )}
      </div>
      {/* iPhone PNG frame on top — drop-shadow segue l'alpha del PNG (silhouette telefono) */}
      <img src="assets/images/beviral/iphone-frame.png" alt="" aria-hidden="true" draggable="false"
        style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 2, pointerEvents: "none", userSelect: "none", filter: "drop-shadow(0 40px 80px rgba(10,10,20,0.5))" }} />
    </div>
  );
}

function VideoShowcase() {
  const [active, setActive] = useState(0);
  const [dir, setDir] = useState(1);          // direzione ultima navigazione: +1 destra, -1 sinistra
  const [isMobile, setIsMobile] = useState(false);
  const drag = useRef({ on: false, x0: 0 });
  const total = TIKTOKS.length;

  // Navigazione infinita circolare — traccia anche la direzione
  const go = (n) => {
    setDir(n >= active ? 1 : -1);
    setActive(((n % total) + total) % total);
  };

  useEffect(() => {
    const mq = window.matchMedia("(max-width: 860px)");
    const f = () => setIsMobile(mq.matches); f();
    mq.addEventListener("change", f);
    return () => mq.removeEventListener("change", f);
  }, []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight") go(active + 1);
      if (e.key === "ArrowLeft")  go(active - 1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [active]);

  const onDown = (e) => { drag.current = { on: true, x0: e.touches ? e.touches[0].clientX : e.clientX }; };
  const onUp   = (e) => {
    if (!drag.current.on) return;
    drag.current.on = false;
    const x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const d = x - drag.current.x0;
    if (d < -45) go(active + 1);
    else if (d > 45) go(active - 1);
  };

  // ── Desktop: coverflow 3D ──────────────────────────────────────────
  const circOffset = (i) => {
    let o = i - active;
    if (o > total / 2) o -= total;
    if (o < -total / 2) o += total;
    return o;
  };
  const styleFor = (o) => {
    const base = "translate(-50%, -50%)";
    if (o === 0) return { transform: `${base} translateZ(0) scale(1) rotateY(0deg)`, opacity: 1, zIndex: 4, filter: "brightness(1) blur(0px)", pointerEvents: "auto" };
    if (o === -1) return { transform: `${base} translateX(-76%) translateZ(-150px) scale(0.76) rotateY(30deg)`, opacity: 0.85, zIndex: 2, filter: "brightness(0.7) blur(0.8px)", pointerEvents: "auto" };
    if (o === 1)  return { transform: `${base} translateX(76%) translateZ(-150px) scale(0.76) rotateY(-30deg)`, opacity: 0.85, zIndex: 2, filter: "brightness(0.7) blur(0.8px)", pointerEvents: "auto" };
    const side = o > 0 ? 1 : -1;
    return { transform: `${base} translateX(${side * 155}%) translateZ(-280px) scale(0.56) rotateY(${side * -38}deg)`, opacity: 0, zIndex: 0, pointerEvents: "none", filter: "brightness(0.4) blur(2px)" };
  };

  // ── Frecce (condivise) ─────────────────────────────────────────────
  const arrowBtn = (d) => (
    <button onClick={() => go(active + d)} aria-label={d < 0 ? "Precedente" : "Successivo"} style={{
      position: "absolute", top: "50%", transform: "translateY(-50%)",
      [d < 0 ? "left" : "right"]: 0, zIndex: 20,
      width: "clamp(44px, 5vw, 56px)", height: "clamp(44px, 5vw, 56px)", borderRadius: "50%",
      border: "2px solid var(--ink)",
      background: d < 0 ? "var(--yellow)" : "var(--blue)",
      color: d < 0 ? "var(--ink)" : "#fff",
      cursor: "pointer", fontSize: 22, display: "grid", placeItems: "center", transition: "opacity .2s",
    }}>{d < 0 ? "←" : "→"}</button>
  );

  // ── Caption condivisa ──────────────────────────────────────────────
  const caption = (
    <div style={{ textAlign: "center", marginTop: "clamp(26px, 4vw, 44px)" }}>
      <h3 style={{ margin: 0, fontFamily: "Bricolage Grotesque", fontWeight: 700, fontSize: "clamp(22px, 3vw, 36px)", letterSpacing: "-0.02em", lineHeight: 1 }}>
        {TIKTOKS[active].client}
      </h3>
      {TIKTOKS[active].views && (
        <div className="mono" style={{ marginTop: 12, color: "var(--ink-muted)", display: "inline-flex", alignItems: "center", gap: 8 }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          {TIKTOKS[active].views} visualizzazioni
        </div>
      )}
      <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 22, flexWrap: "wrap" }}>
        {TIKTOKS.map((_, i) => (
          <button key={i} onClick={() => go(i)} aria-label={`Video ${i + 1}`} style={{
            width: i === active ? 26 : 9, height: 9, borderRadius: 999, padding: 0, border: "none",
            background: i === active ? "var(--ink)" : "rgba(10,10,20,0.2)",
            cursor: "pointer", transition: "all .3s cubic-bezier(.2,.7,.2,1)",
          }} />
        ))}
      </div>
      <div className="mono" style={{ marginTop: 14, color: "var(--ink-muted)" }}>
        {String(active + 1).padStart(2, "0")} / {String(total).padStart(2, "0")}
      </div>
    </div>
  );

  // ── Heading condivisa ──────────────────────────────────────────────
  const heading = (
    <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 20, marginBottom: "clamp(28px, 4vw, 48px)" }}>
      <div>
        <div className="mono" style={{ color: "var(--blue)", marginBottom: 14 }}>● Showreel clienti</div>
        <h2 className="display" style={{ margin: 0, fontFamily: "Bricolage Grotesque", fontWeight: 700, fontSize: "clamp(34px, 5.4vw, 76px)", lineHeight: 0.92, letterSpacing: "-0.03em" }}>
          Video che <span className="serif-i" style={{ color: "var(--red)" }}>spaccano</span>
        </h2>
      </div>
      <p style={{ maxWidth: 320, margin: 0, color: "var(--ink-muted)", fontSize: 16, lineHeight: 1.5 }}>
        Contenuti reali, risultati reali. Scorri per vedere i video virali che abbiamo prodotto per i nostri clienti.
      </p>
    </div>
  );

  return (
    <section id="virali" style={{ padding: "40px 0 96px", position: "relative", overflow: "hidden" }}>
      <div style={{ maxWidth: "var(--max)", margin: "0 auto", padding: "0 var(--pad)", "--phw": "clamp(220px, 64vw, 300px)" }}>
        {heading}

        {isMobile ? (
          /* ── MOBILE: 1 telefono, fade laterale, niente overflow ── */
          <div
            onTouchStart={onDown} onTouchEnd={onUp}
            data-no-sticker
            style={{ position: "relative", display: "flex", justifyContent: "center", alignItems: "center" }}>
            {/* Telefono attivo — key=active forza il remount, animazione solo opacità */}
            <div key={active} style={{
              animation: "bvFadeIn 0.22s ease-out both",
              flexShrink: 0,
              background: "transparent",
              willChange: "opacity",
            }}>
              <Phone item={TIKTOKS[active]} play={true} live={true} />
            </div>
            {arrowBtn(-1)}
            {arrowBtn(1)}
          </div>
        ) : (
          /* ── DESKTOP: coverflow 3D ── */
          <div
            onMouseDown={onDown} onMouseUp={onUp} onMouseLeave={() => { drag.current.on = false; }}
            onTouchStart={onDown} onTouchEnd={onUp}
            data-no-sticker
            style={{
              position: "relative", width: "100%", maxWidth: 860, margin: "0 auto",
              height: "calc(var(--phw) * 2.06)", perspective: "1700px",
            }}>
            {TIKTOKS.map((item, i) => {
              const o = circOffset(i);
              return (
                <div key={i} style={{
                  position: "absolute", left: "50%", top: "50%",
                  transformStyle: "preserve-3d", willChange: "transform, opacity, filter",
                  transition: "transform .65s cubic-bezier(.33,1,.32,1), opacity .45s ease, filter .45s ease",
                  ...styleFor(o),
                }}>
                  <Phone item={item} play={o === 0} live={Math.abs(o) <= 1} />
                  {Math.abs(o) === 1 && (
                    <button onClick={() => go(i)} aria-label={`Vai a ${item.client}`} style={{
                      position: "absolute", inset: 0, border: "none", background: "transparent",
                      cursor: "pointer", borderRadius: 48,
                    }} />
                  )}
                </div>
              );
            })}
            {arrowBtn(-1)}
            {arrowBtn(1)}
          </div>
        )}

        {caption}
      </div>
    </section>
  );
}

/* ─────────────────────── APP ─────────────────────── */
function App() {
  const cms = useBmgCms();
  return (
    <>
      <Nav />
      <main>
        <Hero cms={cms} />
        <VideoShowcase />
        <PopMarquee />
        <Manifesto />
        <Servizi />
        <Metodo />
        <Cta />
        <Footer />
      </main>
      <StickerBomb />
    </>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
