function ClientStrip() {
  const trackRef = useRef(null);
  const animRef  = useRef(null);
  const posRef   = useRef(0);
  const SPEED    = 2.2; // px/frame (+20%)

  useEffect(() => {
    const track = trackRef.current;
    if (!track) return;
    const step = () => {
      posRef.current += SPEED;
      const half = track.scrollWidth / 2;
      if (posRef.current >= half) posRef.current -= half;
      track.style.transform = `translateX(${-posRef.current}px)`;
      animRef.current = requestAnimationFrame(step);
    };
    animRef.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(animRef.current);
  }, []);

  const drag = useRef({ on: false, x0: 0, p0: 0 });
  const onTouchStart = (e) => { drag.current = { on: true, x0: e.touches[0].clientX, p0: posRef.current }; };
  const onTouchMove  = (e) => { if (!drag.current.on) return; posRef.current = drag.current.p0 - (e.touches[0].clientX - drag.current.x0); };
  const onTouchEnd   = () => { drag.current.on = false; };

  const items = [...CLIENT_STRIP_ITEMS, ...CLIENT_STRIP_ITEMS];
  const H = "clamp(300px, 32vw, 480px)";

  return (
    <section
      style={{
        overflow: "hidden",
        width: "100%",
        lineHeight: 0,
        background: "var(--bg-deep)", /* nero BMG */
      }}
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
      aria-label="Clienti"
    >
      <div
        ref={trackRef}
        style={{ display: "flex", width: "max-content", willChange: "transform" }}
      >
        {items.map((item, i) => (
          <div
            key={`${item.id}-${i}`}
            style={{
              position: "relative",
              flexShrink: 0,
              width: H,
              height: H,
              overflow: "hidden",
              background: "var(--bg-deep)",
            }}
          >
            <img
              src={item.src}
              alt={item.logo}
              loading="lazy"
              style={{
                position: "absolute", inset: 0,
                width: "100%", height: "100%",
                objectFit: "cover", objectPosition: "center",
                display: "block",
              }}
            />
            {/* overlay editoriale — più scuro per look premium */}
            <div style={{
              position: "absolute", inset: 0,
              background: "rgba(14,12,8,0.52)",
            }} />
            {/* nome cliente centrato */}
            <div style={{
              position: "absolute", inset: 0,
              display: "flex", alignItems: "center", justifyContent: "center",
              padding: "0 24px",
            }}>
              <span style={{
                fontFamily: "Bricolage Grotesque, system-ui, sans-serif",
                fontWeight: 600,
                fontSize: "clamp(15px, 1.5vw, 24px)",
                letterSpacing: "-0.01em",
                lineHeight: 1.15,
                color: "#f3efe7",
                textAlign: "center",
                textShadow: "0 2px 16px rgba(0,0,0,0.7)",
              }}>{item.logo}</span>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

  const [hover, setHover] = useState(false);
  return (
    <section style={{
      position: "relative",
      background: "#1538ec",
      color: "#fff",
      padding: "120px 0",
      overflow: "hidden",
      borderTop: "1px solid rgba(0,0,0,0.2)",
      borderBottom: "1px solid rgba(0,0,0,0.2)",
    }} data-on-dark="1">
      {/* dotted backdrop */}
      <div style={{
        position: "absolute", inset: 0,
        backgroundImage: "radial-gradient(rgba(255,255,255,0.08) 1.5px, transparent 1.5px)",
        backgroundSize: "30px 30px",
        pointerEvents: "none",
      }} />

      {/* floating stickers */}
      <div style={{
        position: "absolute", top: 36, left: "6%",
        width: 104, height: 104,
        filter: "drop-shadow(0 7px 16px rgba(10,10,20,0.28))",
      }}>
        <svg viewBox="-50 -50 100 100" width="104" height="104" aria-hidden="true"
          style={{ position: "absolute", inset: 0, animation: "spin-slow 18s linear infinite" }}>
          {(() => {
            const pts = 14;
            const mk = (rIn, rOut) => Array.from({ length: pts * 2 }).map((_, i) => {
              const a = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
              const r = i % 2 ? rOut : rIn;
              return `${(Math.cos(a) * r).toFixed(2)},${(Math.sin(a) * r).toFixed(2)}`;
            }).join(" ");
            return <g><polygon points={mk(42, 50)} fill="#fff" /><polygon points={mk(38, 45)} fill="#ffd633" stroke="#0e0c08" strokeWidth="2" strokeLinejoin="round" /></g>;
          })()}
        </svg>
        <span className="mono" style={{
          position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
          width: "64%", color: "#0e0c08", fontWeight: 700,
          fontSize: 11, lineHeight: 1.15, textAlign: "center", letterSpacing: "0.02em",
        }}>NEW<br />DIVISION</span>
      </div>
      <svg viewBox="-50 -50 100 100" width="60" height="60" style={{
        position: "absolute", top: 200, right: "10%", transform: "rotate(18deg)",
      }} aria-hidden="true">
        <path fill="#ff2e2e" stroke="#0e0c08" strokeWidth="3" strokeLinejoin="round"
          d="M0,-48 L11,-15 L46,-15 L18,5 L29,38 L0,18 L-29,38 L-18,5 L-46,-15 L-11,-15 Z" />
      </svg>

      <div style={{ maxWidth: "var(--max)", margin: "0 auto", padding: "0 var(--pad)", position: "relative" }}>
        <div style={{
          display: "flex", alignItems: "center", gap: 14,
          color: "rgba(255,255,255,0.7)",
        }}>
          <span className="mono">★</span>
          <span style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.25)" }} />
          <span className="mono">Una divisione di bmg</span>
        </div>

        <h2 style={{
          margin: "60px 0 0",
          fontFamily: "Bricolage Grotesque", fontWeight: 700,
          fontSize: "clamp(96px, 18vw, 320px)",
          lineHeight: 0.82,
          letterSpacing: "-0.06em",
          textAlign: "center",
          color: "#fff",
        }}>
          Be<span style={{ color: "#ffd633" }}>Viral</span>
          <sup style={{ fontSize: "0.16em", verticalAlign: "super", marginLeft: 12, color: "#ff2e2e", fontWeight: 400 }}>®</sup>
        </h2>

        <div style={{
          marginTop: 80,
          display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 80, alignItems: "end",
        }}>
          <p style={{
            margin: 0,
            fontFamily: "Bricolage Grotesque", fontWeight: 400,
            fontSize: "clamp(24px, 3vw, 44px)",
            lineHeight: 1.15, letterSpacing: "-0.02em",
            textWrap: "balance",
          }}>
            La divisione specializzata in <em className="serif-i" style={{ color: "#ffd633" }}>video virali</em>, personal branding e crescita organica. Per chi vuole diventare un <em className="serif-i" style={{ color: "#ffd633" }}>punto di riferimento</em> nel proprio settore.
          </p>

          <div style={{ display: "flex", flexDirection: "column", gap: 24, alignItems: "flex-start" }}>
            <ul style={{
              listStyle: "none", margin: 0, padding: 0,
              display: "flex", flexDirection: "column", gap: 10,
            }}>
              {["Personal branding", "Video & script", "Copertura organica", "Strategia editoriale"].map((s) => (
                <li key={s} className="mono" style={{
                  display: "inline-flex", alignItems: "center", gap: 12,
                  color: "#fff",
                }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#ffd633" }} />
                  {s}
                </li>
              ))}
            </ul>

            <a href="beviral.html"
              onMouseEnter={() => setHover(true)}
              onMouseLeave={() => setHover(false)}
              data-cursor="hover"
              style={{
                marginTop: 18,
                display: "inline-flex", alignItems: "center", gap: 14,
                background: hover ? "#ffd633" : "#fff",
                color: "#0e0c08",
                border: "1.5px solid #0e0c08",
                borderRadius: 999,
                padding: "22px 32px",
                fontFamily: "Bricolage Grotesque", fontWeight: 600,
                fontSize: 22, letterSpacing: "-0.01em",
                boxShadow: hover ? "8px 8px 0 #0e0c08" : "5px 5px 0 #0e0c08",
                transform: hover ? "translate(-3px, -3px)" : "none",
                transition: "all .25s",
              }}>
              Scopri BeViral
              <span style={{ fontSize: 28, transform: hover ? "rotate(-12deg) translateX(4px)" : "none", transition: "transform .25s" }}>↗</span>
            </a>
          </div>
        </div>
      </div>

      {/* spin-slow keyframes (inline since we're in a section) */}
      <style>{`@keyframes spin-slow { from { transform: rotate(0); } to { transform: rotate(360deg); } }`}</style>
    </section>
  );
}

/* ============== APP ============== */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#b9542c",
  "bg": "#f3efe7",
  "showStudio": true
}/*EDITMODE-END*/;

const ACCENT_OPTIONS = ["#b9542c", "#c93a23", "#3a5a40", "#2a3142", "#0e0c08"];
const BG_OPTIONS = ["#f3efe7", "#ffffff", "#ece6da", "#0e0c08"];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--accent", t.accent);
    root.style.setProperty("--bg", t.bg);
    // when bg is dark, flip ink colors
    const isDark = ["#0e0c08", "#14110b"].includes(t.bg.toLowerCase());
    root.style.setProperty("--ink", isDark ? "#f3efe7" : "#14110b");
    root.style.setProperty("--ink-muted", isDark ? "rgba(243,239,231,0.65)" : "#6a6358");
    root.style.setProperty("--line", isDark ? "rgba(243,239,231,0.18)" : "rgba(20, 17, 11, 0.14)");
  }, [t.accent, t.bg]);

  const onContact = () => {
    const el = document.getElementById("contatti");
    if (el) window.scrollTo({ top: el.offsetTop - 24, behavior: "smooth" });
  };

  return (
    <>
      <Nav onContact={onContact} />
      <main>
        <Hero />
        <Sectors />
        <About />
        <Services />
        <Projects />
        <ClientStrip />
        <BeviralSpotlight />
        <Contact />
        <Footer />
      </main>

      <TweaksPanel title="Tweaks · bmg">
        <TweakSection label="Identità">
          <TweakColor
            label="Accento"
            value={t.accent}
            options={ACCENT_OPTIONS}
            onChange={(v) => setTweak("accent", v)}
          />
          <TweakColor
            label="Sfondo"
            value={t.bg}
            options={BG_OPTIONS}
            onChange={(v) => setTweak("bg", v)}
          />
        </TweakSection>
        <TweakSection label="Azioni rapide">
          <TweakButton label="↑ Torna su" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} />
          <TweakButton label="→ Vai a Contatti" onClick={onContact} secondary />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
