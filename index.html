<html lang="it">

<style>
  :root {
    --bg: #f3efe7;
    --bg-deep: #0e0c08;
    --ink: #14110b;
    --ink-muted: #6a6358;
    --line: rgba(20, 17, 11, 0.14);
    --line-on-dark: rgba(243, 239, 231, 0.18);
    --accent: #b9542c;
    --max: 1440px;
    --pad: 32px;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Bricolage Grotesque", system-ui, sans-serif;
    font-feature-settings: "ss01" 1, "ss02" 1, "kern" 1;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: #fff; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .serif-i { font-family: "Instrument Serif", Georgia, serif; font-style: italic; font-weight: 400; }

  /* hide scrollbar on marquee */
  .marquee-mask { mask-image: linear-gradient(90deg, transparent 0, #000 6%, #000 94%, transparent 100%); -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 6%, #000 94%, transparent 100%); }

  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  @keyframes rise { from { transform: translateY(120%); } to { transform: translateY(0); } }
  @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* reveal on scroll */
  .reveal { opacity: 0; transform: translateY(12px); transition: opacity .55s cubic-bezier(.25,.46,.45,.94), transform .55s cubic-bezier(.25,.46,.45,.94); will-change: opacity, transform; }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* ============== RESPONSIVE ============== */
  @media (max-width: 860px) {
    :root { --pad: 18px; }

    /* Nav: hide center menu and tighten CTA */
    nav ul { display: none !important; }
    nav button { padding: 8px 12px !important; font-size: 9px !important; letter-spacing: 0.08em !important; }
    nav > div[style*="grid-template-columns: auto 1fr auto"] {
      grid-template-columns: auto 1fr auto !important;
      gap: 12px !important;
    }

    /* Generic 2-col grids in main → 1-col */
    main [style*="grid-template-columns: 1.2fr 1fr"],
    main [style*="grid-template-columns: 1.4fr 1fr"],
    main [style*="grid-template-columns: 1.1fr 1fr"],
    main [style*="grid-template-columns: 1fr 1.4fr"],
    main [style*="grid-template-columns: 1fr 1fr"] {
      grid-template-columns: 1fr !important;
      gap: 28px !important;
    }

    /* 4-col stats grids → 2-col */
    main [style*="grid-template-columns: repeat(4, 1fr)"] {
      grid-template-columns: 1fr 1fr !important;
      gap: 16px !important;
    }

    /* Verticali slides → stack image over text, hide arrow */
    .vert-slide { grid-template-columns: 1fr !important; }
    .vert-slide > .vs-img { aspect-ratio: 16 / 9 !important; min-height: 0 !important; }
    .vert-slide > .vs-arrow { display: none !important; }
    .vert-slide > .vs-text { padding: 20px !important; }

    /* Accordion lavori */
    .acc-head {
      grid-template-columns: 26px 1fr 36px !important;
      gap: 10px !important;
      padding: 18px var(--pad) !important;
      width: 100% !important;
      box-sizing: border-box !important;
    }
    .acc-cat, .acc-serv { display: none !important; }
    .acc-name { font-size: 22px !important; }
    .acc-num  { width: auto !important; }
    .acc-icon { width: 32px !important; height: 32px !important; font-size: 18px !important; }
    .acc-body { max-width: 100% !important; padding: 8px var(--pad) 32px !important; }

    /* Hero H1 */
    h1[style*="clamp(48px, 8.4vw, 144px)"] {
      font-size: 42px !important;
      line-height: 1 !important;
    }

    /* Various big H2 */
    h2[style*="clamp(40px, 6vw, 96px)"] {
      font-size: 36px !important;
      line-height: 1 !important;
    }
    h2[style*="clamp(56px, 9vw, 168px)"] {
      font-size: 44px !important;
      line-height: 1 !important;
    }
    p[style*="clamp(28px, 3.6vw, 56px)"] {
      font-size: 24px !important;
      line-height: 1.15 !important;
    }

    /* Service rows: mobile layout */
    main [style*="grid-template-columns: 80px 1fr auto 60px"] {
      grid-template-columns: 24px 1fr !important;
      gap: 10px 12px !important;
      align-items: flex-start !important;
      padding-top: 18px !important;
      padding-bottom: 18px !important;
    }
    /* nasconde colonna tag e freccia su mobile */
    main [style*="grid-template-columns: 80px 1fr auto 60px"] > *:nth-child(3),
    main [style*="grid-template-columns: 80px 1fr auto 60px"] > *:nth-child(4) {
      display: none !important;
    }
    /* titolo servizio */
    main [style*="grid-template-columns: 80px 1fr auto 60px"] > div {
      transform: none !important;
    }
    main span[style*="clamp(28px, 4.4vw, 64px)"] { font-size: 22px !important; }
    /* sezione servizi: zero overflow laterale */
    #servizi { overflow-x: hidden !important; }
    #servizi > div { box-sizing: border-box !important; }

    /* Sezione lavori — nessun overflow laterale */
    #lavori { overflow-x: hidden !important; }

    /* Hero status & bottom row stack */
    section [style*="justify-content: space-between"][style*="flex"] { flex-wrap: wrap !important; gap: 12px !important; }

    /* About: hide tilted decorative photos on mobile */
    section#chi-siamo > div > div[style*="position: absolute"] {
      display: none !important;
    }

    /* Beviral spotlight wordmark */
    section h2[style*="clamp(96px, 18vw, 320px)"] {
      font-size: 72px !important;
      line-height: 0.9 !important;
    }

    /* Sectors marquee text */
    section span[style*="font-size: 42px"] { font-size: 26px !important; }

    /* Footer big wordmark + 4-col → 2-col */
    footer [style*="clamp(120px, 24vw, 420px)"] { font-size: 96px !important; }
    footer [style*="grid-template-columns: repeat(4, 1fr)"] {
      grid-template-columns: 1fr 1fr !important;
      gap: 16px !important;
    }

    /* Tweaks panel: smaller */
    .twk-panel { width: 240px !important; right: 8px !important; bottom: 8px !important; }
  }

  @media (max-width: 480px) {
    :root { --pad: 14px; }

    h1[style*="clamp(48px, 8.4vw, 144px)"] { font-size: 36px !important; }
    h2[style*="clamp(56px, 9vw, 168px)"] { font-size: 38px !important; }
    section h2[style*="clamp(96px, 18vw, 320px)"] { font-size: 54px !important; }
    footer [style*="clamp(120px, 24vw, 420px)"] { font-size: 64px !important; }

    /* Stats 2x2 stays */
    /* Footer 2-col stays */
  }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <script src="image-slot.js"><\/script>
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {

          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);

          const sy = corner.includes('s') ? 1 : -1;

          const cy0 = (50 + this._view.y) / 100 * fh;

          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;

            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };

          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };

        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

function TweakRow({ label, value, children, inline = false }) {

    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* Reveal-on-scroll wrapper */
function Reveal({ children, delay = 0, as: As = "div", style, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          setTimeout(() => el.classList.add("in"), delay);
          io.unobserve(el);
        }
      });
    }, { threshold: 0.08, rootMargin: "0px 0px -32px 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, [delay]);
  return <As ref={ref} className="reveal" style={style} {...rest}>{children}</As>;
}

/* Striped image placeholder — used wherever a real photo will eventually go */
function Placeholder({ ratio = "4 / 3", label = "image", tone = "light", style }) {
  const isDark = tone === "dark";
  const stripeA = isDark ? "rgba(243,239,231,0.05)" : "rgba(20,17,11,0.05)";
  const stripeB = isDark ? "rgba(243,239,231,0.10)" : "rgba(20,17,11,0.09)";
  const fg = isDark ? "rgba(243,239,231,0.6)" : "rgba(20,17,11,0.55)";
  const border = isDark ? "rgba(243,239,231,0.15)" : "rgba(20,17,11,0.12)";
  return (
    <div style={{
      aspectRatio: ratio,
      width: "100%",
      position: "relative",
      backgroundImage: `repeating-linear-gradient(135deg, ${stripeA} 0 12px, ${stripeB} 12px 24px)`,
      border: `1px solid ${border}`,
      overflow: "hidden",
      ...style,
    }}>
      <div style={{
        position: "absolute", inset: 0,
        display: "flex", alignItems: "flex-end", justifyContent: "flex-start",
        padding: 14,
      }}>
        <span className="mono" style={{ color: fg, fontSize: 10 }}>↳ {label}</span>
      </div>
    </div>
  );
}

/* Custom cursor blob — discreet */
function CursorBlob() {
  const cur = useRef(null);
  const [touch, setTouch] = useState(false);
  useEffect(() => {
    if (matchMedia("(hover: none)").matches) setTouch(true);
  }, []);
  useEffect(() => {
    if (touch) return;
    let mx = -100, my = -100, raf;
    const onMove = (e) => { mx = e.clientX; my = e.clientY; };
    const onOver = (e) => {
      if (!cur.current) return;
      const t = e.target.closest("a, button, [data-cursor='hover'], input, textarea, select, label");
      cur.current.dataset.hover = t ? "1" : "0";
      const accentBg = e.target.closest('[data-cursor-bg="accent"], [data-on-dark]');
      cur.current.dataset.onAccent = accentBg ? "1" : "0";
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseover", onOver);
    const tick = () => {
      if (cur.current) cur.current.style.transform = `translate3d(${mx}px, ${my}px, 0)`;
      raf = requestAnimationFrame(tick);
    };
    tick();
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseover", onOver);
      cancelAnimationFrame(raf);
    };
  }, [touch]);
  if (touch) return null;
  return (
    <>
      <div ref={cur} data-hover="0" data-on-accent="0" id="bmg-cursor" style={{
        position: "fixed", top: 0, left: 0,
        pointerEvents: "none", zIndex: 9999,
        willChange: "transform",
      }}>
        <svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true" style={{ overflow: "visible", display: "block" }}>
          {/* default — editorial arrow pointer (tip at origin) */}
          <g className="bmg-cur-arrow">
            <path d="M0 0 L0 19 L5 14.6 L8.4 22 L11.4 20.7 L8 13.4 L15 13.4 Z"
              fill="currentColor" stroke="var(--cur-edge)" strokeWidth="1.4" strokeLinejoin="round" strokeLinecap="round" />
          </g>
          {/* hover — ring with accent core */}
          <g className="bmg-cur-hover">
            <circle cx="0" cy="0" r="13" fill="none" stroke="currentColor" strokeWidth="1.5" />
            <circle cx="0" cy="0" r="3" fill="var(--accent)" />
          </g>
        </svg>
      </div>
      <style>{`
        body { cursor: none; }
        a, button, [data-cursor='hover'], input, textarea, select, label { cursor: none; }
        #bmg-cursor { --cur-edge: var(--bg); color: var(--ink); transition: color .2s ease; }
        #bmg-cursor .bmg-cur-arrow { transition: opacity .2s ease, transform .3s cubic-bezier(.2,.7,.2,1); transform-origin: 0 0; }
        #bmg-cursor .bmg-cur-hover { transition: opacity .25s ease, transform .35s cubic-bezier(.2,.7,.2,1); transform-origin: 0 0; transform: scale(0); opacity: 0; }
        #bmg-cursor[data-hover='1'] .bmg-cur-arrow { opacity: 0; transform: scale(.35); }
        #bmg-cursor[data-hover='1'] .bmg-cur-hover { transform: scale(1); opacity: 1; }
        #bmg-cursor[data-on-accent='1'] { color: var(--bg); --cur-edge: rgba(20,17,11,0.5); }
      `}</style>
    </>
  );
}

    f(); window.addEventListener("scroll", f, { passive: true });
    return () => window.removeEventListener("scroll", f);

/* ============== HERO MEDIA — slideshow di sfondo (desktop) / video verticale (mobile) ============== */
function HeroMedia() {
  const imgData = (window.BMG_IMAGES && window.BMG_IMAGES.hero) || [];
  const imgs = imgData.length ? imgData.map(i => i.src) : ["assets/images/vetera_matera-1200.webp", "assets/images/favorita_hotel-1200.webp", "assets/images/costiera_gin-1200.webp"];
  const [active, setActive] = useState(0);
  const [isMobile, setIsMobile] = useState(false);
  const [vidUrl, setVidUrl] = useState(null);
  const [blobVid, setBlobVid] = useState(null);
  const fileRef = useRef(null);

  useEffect(() => {
    const mq = window.matchMedia("(max-width: 720px)");
    const f = () => setIsMobile(mq.matches);
    f();
    mq.addEventListener("change", f);
    return () => mq.removeEventListener("change", f);
  }, []);

  useEffect(() => {
    if (isMobile) return undefined;
    const t = setInterval(() => setActive((a) => (a + 1) % imgs.length), 4800);
    return () => clearInterval(t);
  }, [isMobile]);

  function pickVideo(file) {
    if (!file || !file.type || !file.type.startsWith("video/")) return;
    setVidUrl((prev) => { if (prev) URL.revokeObjectURL(prev); return URL.createObjectURL(file); });
  }

  // Cream wash so the dark title stays legible over any photo/video.
  const scrim = (
    <div style={{
      position: "absolute", inset: 0, pointerEvents: "none", zIndex: 2,
      background:
        "linear-gradient(90deg, rgba(243,239,231,0.80) 0%, rgba(243,239,231,0.62) 44%, rgba(243,239,231,0.34) 80%, rgba(243,239,231,0.24) 100%), linear-gradient(180deg, var(--bg) 0%, rgba(243,239,231,0.18) 15%, rgba(243,239,231,0.18) 62%, rgba(243,239,231,0.66) 100%)",
    }} />
  );

  if (isMobile) {
    const videoSrc = vidUrl || blobVid || "assets/hero-mobile.mp4";
    return (
      <div style={{ position: "absolute", inset: 0, overflow: "hidden", zIndex: 0 }}>
        <div
          onClick={() => fileRef.current && fileRef.current.click()}
          onDragOver={(e) => e.preventDefault()}
          onDrop={(e) => { e.preventDefault(); pickVideo(e.dataTransfer.files[0]); }}
          style={{ position: "absolute", inset: 0, cursor: "pointer" }}>
          <video
            key={videoSrc}
            src={videoSrc}
            poster={imgs[0]}
            autoPlay muted loop playsInline
            onError={() => {
              // Some static hosts (and this preview) don't serve byte-range
              // requests, which breaks streaming <video src>. Fall back to
              // fetching the whole file as a blob URL.
              if (vidUrl || blobVid) return;
              fetch("assets/hero-mobile.mp4").then((r) => r.blob())
                .then((b) => setBlobVid(URL.createObjectURL(b))).catch(() => {});
            }}
            style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        </div>
        <input ref={fileRef} type="file" accept="video/*" style={{ display: "none" }}
          onChange={(e) => pickVideo(e.target.files[0])} />
        <div style={{
          position: "absolute", inset: 0, pointerEvents: "none", zIndex: 2,
          background: "linear-gradient(180deg, var(--bg) 0%, rgba(243,239,231,0.42) 18%, rgba(243,239,231,0.36) 58%, rgba(243,239,231,0.58) 100%)",
        }} />
      </div>
    );
  }

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden", zIndex: 0 }}>
      {imgs.map((src, i) => (
        <image-slot
          key={i}
          id={`hero-bg-${i + 1}`}
          src={src}
          placeholder="Trascina una foto"
          shape="rect"
          style={{
            position: "absolute", inset: 0, width: "100%", height: "100%",
            opacity: i === active ? 1 : 0,
            pointerEvents: i === active ? "auto" : "none",
            transition: "opacity 1.1s ease",
          }}
        />
      ))}
      {scrim}
      <div style={{
        position: "absolute", right: "var(--pad)", bottom: 26, zIndex: 3,
        display: "flex", gap: 8, alignItems: "center",
      }}>
        {imgs.map((_, i) => (
          <button key={i} onClick={() => setActive(i)} aria-label={`Foto ${i + 1}`}
            style={{
              width: i === active ? 24 : 8, height: 8, borderRadius: 999, border: "none",
              background: i === active ? "var(--accent)" : "rgba(26,22,18,0.22)",
              cursor: "pointer", transition: "all .35s cubic-bezier(.2,.7,.2,1)", padding: 0,
            }} />
        ))}
      </div>
    </div>
  );
}

/* Count-up number that animates when it scrolls into view */
function CountUp({ to, duration = 1500, style }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    let raf, started = false;
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => {
        if (e.isIntersecting && !started) {
          started = true;
          const t0 = performance.now();
          const tick = (t) => {
            const p = Math.min(1, (t - t0) / duration);
            const eased = 1 - Math.pow(1 - p, 3);
            setVal(Math.round(eased * to));
            if (p < 1) raf = requestAnimationFrame(tick);
          };
          raf = requestAnimationFrame(tick);
          io.unobserve(el);
        }
      });
    }, { threshold: 0.5 });
    io.observe(el);
    return () => { io.disconnect(); cancelAnimationFrame(raf); };
  }, [to, duration]);
  return <span ref={ref} style={style}>{val}</span>;
}

                    }}>{t}</span>
                  ))}
                </div>
                <span style={{
                  fontFamily: "Instrument Serif", fontSize: 42,
                  transform: isHover ? "translateX(6px)" : "translateX(0)",
                  transition: "transform .4s cubic-bezier(.4,0,.2,1), color .4s",
                  color: isHover ? "var(--accent)" : "var(--ink)",
                  justifySelf: "end",
                }}>→</span>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

function Projects() {
  const [open, setOpen] = useState(null);
  const [isTouch, setIsTouch] = useState(true); // default true per evitare flash
  const hoverTimer = useRef(null);

  useEffect(() => {
    // hover:hover + pointer:fine = vero dispositivo con mouse
    const mq = window.matchMedia("(hover: hover) and (pointer: fine)");
    const f = () => setIsTouch(!mq.matches);
    f();
    mq.addEventListener("change", f);
    return () => mq.removeEventListener("change", f);
  }, []);

  // Desktop: apri dopo 160ms dal mouse enter (evita trigger involontari)
  const onRowEnter = (slug) => {
    if (isTouch) return;
    clearTimeout(hoverTimer.current);
    hoverTimer.current = setTimeout(() => setOpen(slug), 160);
  };

  // Desktop: cancella il timer se mouse esce prima del delay
  const onRowLeave = () => {
    if (isTouch) return;
    clearTimeout(hoverTimer.current);
  };

  // Mobile: tap apre/chiude
  const onRowToggle = (slug) => {
    setOpen(open === slug ? null : slug);
  };

  return (
    <section id="lavori" style={{ padding: "60px 0 120px" }}>
      <SectionNumber n="03" label="Lavori selezionati" />

      <div style={{ maxWidth: "var(--max)", margin: "60px auto 56px", padding: "0 var(--pad)",
        display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 32, flexWrap: "wrap",
      }}>
        <Reveal>
          <h2 style={{
            margin: 0,
            fontFamily: "Bricolage Grotesque", fontWeight: 500,
            fontSize: "clamp(40px, 6vw, 96px)",
            lineHeight: 0.95, letterSpacing: "-0.03em",
            maxWidth: 900, textWrap: "balance",
          }}>
            Una <span className="serif-i" style={{ color: "var(--accent)" }}>selezione</span> di brand che abbiamo costruito.
          </h2>
        </Reveal>
        <a href="#contatti" className="mono" data-cursor="hover" style={{
          color: "var(--ink-muted)", whiteSpace: "nowrap",
          borderBottom: "1px solid var(--line)", paddingBottom: 4,
        }}>tutti i progetti →</a>
      </div>

      {/* lista accordion full-width — nessun max-width né padding laterale */}
      <div>
        <div style={{ borderTop: "1px solid var(--ink)" }}>
          {PROJECT_LIST.map((p, i) => (
            <AccordionRow key={p.slug} project={p} index={i} image={PROJECT_PHOTOS[p.slug] || null}
              isOpen={open === p.slug}
              onToggle={() => onRowToggle(p.slug)}

  );

function ProjectSheet({ project, onClose, onPrev, onNext, index, total }) {
  // Lock body scroll while open + ESC / arrow keys
  useEffect(() => {
    if (!project) return;
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    const onKey = (e) => {
      if (e.key === "Escape") onClose?.();
      if (e.key === "ArrowRight") onNext?.();
      if (e.key === "ArrowLeft") onPrev?.();
    };
    window.addEventListener("keydown", onKey);
    return () => {
      document.body.style.overflow = prevOverflow;
      window.removeEventListener("keydown", onKey);
    };
  }, [project, onClose, onNext, onPrev]);

  // Scroll sheet to top on project change
  const scrollRef = useRef(null);
  useEffect(() => {
    if (project && scrollRef.current) scrollRef.current.scrollTop = 0;

                <div className="mono" style={{ color: "var(--ink-muted)", marginTop: 14 }}>{s.v}</div>

        {/* NEXT PROJECT */}
        <section
          onClick={onNext}
          data-cursor="hover"
          style={{
            marginTop: 140,
            borderTop: "1px solid var(--ink)",
            cursor: "pointer",
            padding: "60px var(--pad) 80px",

              fontSize: "clamp(40px, 6vw, 96px)",

            <span style={{
              fontFamily: "Instrument Serif", fontSize: "clamp(48px, 5vw, 80px)",
              color: "var(--accent)",

        {/* Bottom small footer */}
        <div style={{
          padding: "30px var(--pad) 60px",
          maxWidth: "var(--max)", margin: "0 auto",
          display: "flex", justifyContent: "space-between",

          <button
            onClick={onPrev}
            data-cursor="hover"
            className="mono"
            style={{
              appearance: "none", border: 0, background: "transparent",
              color: "var(--ink-muted)", cursor: "pointer",
              fontFamily: "JetBrains Mono", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase",
            }}

          <button
            onClick={onClose}
            data-cursor="hover"
            className="mono"
            style={{
              appearance: "none", border: 0, background: "transparent",
              color: "var(--ink-muted)", cursor: "pointer",
              fontFamily: "JetBrains Mono", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase",
            }}

        </div>
      </div>

      <style>{`
        @keyframes sheetIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes sheetContentIn {
          from { transform: translateY(24px); opacity: 0; }
          to { transform: translateY(0); opacity: 1; }
        }
        @media (max-width: 760px) {
          [role="dialog"] section[style*="grid-template-columns: 1fr 1.4fr"] {
            grid-template-columns: 1fr !important;
            gap: 48px !important;
          }
          [role="dialog"] [style*="grid-template-columns: 1fr 1fr 1fr"] {
            grid-template-columns: 1fr 1fr !important;
          }
        }
      `}</style>
    </div>
  );
}

/* ============== CALENDLY MODAL ============== */
function CalendlyModal({ url, onClose }) {
  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => {
      document.body.style.overflow = prev;
      window.removeEventListener("keydown", onKey);
    };
  }, []);

  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, zIndex: 9999,
        background: "rgba(14,12,8,0.88)",
        backdropFilter: "blur(6px)",
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: "20px",
        animation: "fadein .25s ease",
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          position: "relative",
          width: "100%", maxWidth: 720,
          height: "min(90vh, 760px)",
          background: "#fff",
          borderRadius: 16,
          overflow: "hidden",
          boxShadow: "0 32px 80px rgba(0,0,0,0.6)",
          display: "flex", flexDirection: "column",
        }}
      >
        <button
          onClick={onClose}
          aria-label="Chiudi"
          style={{
            position: "absolute", top: 14, right: 14, zIndex: 10,
            width: 36, height: 36,
            background: "var(--bg-deep)", color: "#f3efe7",
            border: "none", borderRadius: "50%",
            cursor: "pointer", fontSize: 18, lineHeight: 1,
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "background .2s",
          }}
          onMouseEnter={(e) => e.currentTarget.style.background = "var(--accent)"}
          onMouseLeave={(e) => e.currentTarget.style.background = "var(--bg-deep)"}
        >
          ×
        </button>
        <iframe
          src={url}
          width="100%"
          height="100%"
          frameBorder="0"
          title="Prenota una consulenza"
          style={{ flex: 1, border: "none", display: "block" }}
        />
      </div>
    </div>
  );
}

/* ============== CONTACT ============== */
function Contact() {
  const [modalOpen, setModalOpen] = useState(false);
  const [calendlyUrl, setCalendlyUrl] = useState("");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [category, setCategory] = useState("");

  const categories = ["Hospitality", "Food", "Luxury / Retail", "Personal Brand", "Altro"];

  const inputBase = {
    width: "100%",
    background: "transparent",
    border: "none",
    borderBottom: "1px solid rgba(243,239,231,0.2)",
    color: "#f3efe7",
    fontFamily: "Bricolage Grotesque, system-ui, sans-serif",
    fontSize: "clamp(22px, 2.6vw, 36px)",
    fontWeight: 300,
    letterSpacing: "-0.02em",
    padding: "10px 0 16px",
    outline: "none",
    transition: "border-color .3s",
    caretColor: "var(--accent)",
    boxSizing: "border-box",
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    const params = new URLSearchParams({
      hide_landing_page_details: "1",
      hide_gdpr_banner: "1",
      primary_color: "b9542c",
      name,
      email,
    });
    if (category) params.set("a1", category);
    setCalendlyUrl(`https://calendly.com/bemarketinggroup/30min?${params.toString()}`);
    setModalOpen(true);
  };

  return (
    <section id="contatti" data-on-dark="1" style={{
      background: "var(--bg-deep)", color: "#f3efe7",
      padding: "120px 0 100px",
    }}>
      <SectionNumber n="04" label="Contatti" dark />

      <div style={{ maxWidth: "var(--max)", margin: "60px auto 0", padding: "0 var(--pad)" }}>
        <Reveal>
          <h2 style={{
            margin: 0,
            fontFamily: "Bricolage Grotesque", fontWeight: 400,
            fontSize: "clamp(56px, 9vw, 168px)",
            lineHeight: 0.92, letterSpacing: "-0.04em",
            textWrap: "balance",
          }}>
            Costruiamo qualcosa<br />
            di buono <span className="serif-i" style={{ color: "var(--accent)" }}>insieme</span>?
          </h2>
        </Reveal>

        <Reveal delay={200} style={{ marginTop: 80 }}>
          <form onSubmit={handleSubmit} style={{ maxWidth: 680 }}>

            {/* Nome */}
            <div style={{ marginBottom: 48 }}>
              <div className="mono" style={{ color: "rgba(243,239,231,0.4)", marginBottom: 10 }}>
                MI CHIAMO
              </div>
              <input
                type="text"
                placeholder="Nome e cognome"
                value={name}
                onChange={(e) => setName(e.target.value)}
                required
                style={{
                  ...inputBase,
                  "::placeholder": { color: "rgba(243,239,231,0.25)" },
                }}
                onFocus={(e) => e.currentTarget.style.borderBottomColor = "var(--accent)"}
                onBlur={(e) => e.currentTarget.style.borderBottomColor = "rgba(243,239,231,0.2)"}
              />
            </div>

            {/* Email */}
            <div style={{ marginBottom: 48 }}>
              <div className="mono" style={{ color: "rgba(243,239,231,0.4)", marginBottom: 10 }}>
                LA MIA EMAIL È
              </div>
              <input
                type="email"
                placeholder="nome@dominio.com"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                required
                style={inputBase}
                onFocus={(e) => e.currentTarget.style.borderBottomColor = "var(--accent)"}
                onBlur={(e) => e.currentTarget.style.borderBottomColor = "rgba(243,239,231,0.2)"}
              />
            </div>

            {/* Settore */}
            <div style={{ marginBottom: 60 }}>
              <div className="mono" style={{ color: "rgba(243,239,231,0.4)", marginBottom: 16 }}>
                OPERO NEL SETTORE
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                {categories.map((cat) => {
                  const selected = category === cat;
                  return (
                    <button
                      key={cat}
                      type="button"
                      onClick={() => setCategory(selected ? "" : cat)}
                      style={{
                        background: selected ? "var(--accent)" : "transparent",
                        color: selected ? "#fff" : "rgba(243,239,231,0.65)",
                        border: `1px solid ${selected ? "var(--accent)" : "rgba(243,239,231,0.2)"}`,
                        borderRadius: 100,
                        padding: "10px 22px",
                        fontFamily: "JetBrains Mono, monospace",
                        fontSize: 11,
                        letterSpacing: "0.08em",
                        textTransform: "uppercase",
                        cursor: "pointer",
                        transition: "all .2s",
                      }}
                      onMouseEnter={(e) => { if (!selected) { e.currentTarget.style.borderColor = "rgba(243,239,231,0.5)"; e.currentTarget.style.color = "#f3efe7"; }}}
                      onMouseLeave={(e) => { if (!selected) { e.currentTarget.style.borderColor = "rgba(243,239,231,0.2)"; e.currentTarget.style.color = "rgba(243,239,231,0.65)"; }}}
                    >
                      {cat}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* CTA */}
            <button
              type="submit"
              data-cursor="hover"
              style={{
                display: "inline-flex", alignItems: "center", gap: 14,
                background: "var(--accent)", color: "#fff",
                border: "none", borderRadius: 4,
                padding: "20px 40px",
                fontFamily: "Bricolage Grotesque", fontWeight: 600,
                fontSize: "clamp(16px, 2vw, 22px)",
                letterSpacing: "-0.01em",
                cursor: "pointer",
                transition: "opacity .2s, transform .2s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.opacity = "0.88"; e.currentTarget.style.transform = "translateY(-2px)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.opacity = "1"; e.currentTarget.style.transform = "translateY(0)"; }}
            >
              Prenota una consulenza
              <span style={{ fontFamily: "Instrument Serif", fontSize: "1.3em", fontStyle: "italic", fontWeight: 400 }}>→</span>
            </button>

          </form>
        </Reveal>
      </div>

      {modalOpen && <CalendlyModal url={calendlyUrl} onClose={() => setModalOpen(false)} />}
    </section>
  );
}
